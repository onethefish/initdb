  <button class="create-chat-btn" onclick="createModal()">创建新对话</button>
  <button class="delete-chat-btn" onclick="deleteModal()">删除所有对话</button>
  <div class="session-list" id="sessionList">
  </div>
</div>

<!-- 主内容区 -->
<div class="main-content">
  <!-- 欢迎界面 (默认显示) -->
  <div class="welcome-screen" id="welcomeScreen">
    <h2>你好！我是智能数据库助手</h2>
    <p>我可以通过自然语言查询你的数据库信息。开始之前，请先创建一个到数据库的新对话。</p>
    <button class="create-chat-btn" onclick="createModal()" style="max-width: 200px;">创建第一个对话</button>
  </div>

  <!-- 聊天容器 (默认隐藏) -->
  <div class="chat-container" id="chatContainer">
    <div class="chat-header" id="currentSessionHeader">
      <!-- 当前会话名将在此处动态更新 -->
    </div>
    <div class="chat-messages" id="chatMessages">
      <!-- 消息将通过JavaScript动态添加 -->
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="请输入你的问题..." onkeypress="handleKeyPress(event)" disabled>

      <!-- 文件上传相关元素 -->
      <input type="file" id="fileInput" style="display: none;" accept=".txt" onchange="handleFileSelect(this)"/>

      <div class="file-upload-group">
        <button id="uploadFileBtn" class="btn-upload" onclick="triggerFileInput()" aria-label="选择文件" title="选择文件"></button>
        <button id="uploadFileSendBtn" class="btn-send-file" style="display: none;" onclick="uploadSelectedFile()" disabled aria-label="上传并处理" title="上传并处理"></button>
        <ul id="fileList" class="file-list">
          <li class="file-list-item">
            <span id="fileNameText" class="file-list-item-text"></span>
          </li>
        </ul>
      </div>
      <!-- /文件上传相关元素 -->

      <button id="sendMessageBtn" onclick="sendMessage()" disabled>发送</button>
    </div>
  </div>
</div>

<!-- 创建对话模态框 -->
<div id="sessionModal" class="modal">
  <div class="modal-content">
    <h2>创建新对话</h2>
    <div class="form-group">
      <label for="sessionName">对话名称</label>
      <input type="text" id="sessionName" required value="新的对话">
    </div>
    <!--    <div class="form-group">-->
    <!--      <label for="host">主机地址</label>-->
    <!--      <input type="text" id="host" value="localhost">-->
    <!--    </div>-->
    <!--    <div class="form-group">-->
    <!--      <label for="port">端口</label>-->
    <!--      <input type="text" id="port" value="3306">-->
    <!--    </div>-->
    <div class="form-group">
      <label for="url">url</label>
      <input type="text" id="url" required value="jdbc:h2:C:\Users\57172\github\initdb\initdb-ai\db\initdb">
    </div>
    <div class="form-group">
      <label for="username">用户名</label>
      <input type="text" id="username" required>
    </div>
    <div class="form-group">
      <label for="password">密码</label>
      <input type="password" id="password" required>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="createNewSession()">创建</button>
    </div>
  </div>
</div>

<script src="/js/api.js" defer></script>
<script src="/js/index.js" defer></script>
</body>
</html>
