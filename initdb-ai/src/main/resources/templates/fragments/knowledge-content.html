<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div class="page-panel page-panel-active" id="knowledgePage" th:fragment="knowledgePage">
  <div class="knowledge-context-bar" id="knowledgeContextBar" hidden>
    <div class="knowledge-context-text">
      <strong>知识库管理</strong>
      <span class="knowledge-context-sep">·</span>
      <span id="knowledgeContextMeta">当前数据源</span>
    </div>
    <a class="btn btn-secondary knowledge-back-link" href="/datasource" id="knowledgeBackLink">返回数据源管理</a>
  </div>
  <div class="knowledge-invalid" id="knowledgeInvalid" hidden>
    <p>缺少数据源主键参数：请在地址栏提供 <code>id</code>（与数据源列表中的 <code>id</code> 一致），或 <code>datasourceId</code>。</p>
    <a class="btn btn-primary" href="/datasource">返回数据源管理</a>
  </div>
  <div class="knowledge-body" id="knowledgeBody" hidden>
    <div class="datasource-toolbar">
      <input id="kbFilterTitle" placeholder="标题关键词" type="text">
      <select id="kbFilterType" title="知识类型">
        <option value="">类型(全部)</option>
        <option value="DOCUMENT">文档</option>
        <option value="QA">问答</option>
        <option value="FAQ">常见问题</option>
      </select>
      <select id="kbFilterEmbedding" title="向量化状态">
        <option value="">向量化(全部)</option>
        <option value="0">待处理</option>
        <option value="1">处理中</option>
        <option value="2">已完成</option>
        <option value="3">失败</option>
      </select>
      <select id="kbFilterRecall" title="是否参与召回">
        <option value="">召回(全部)</option>
        <option value="1">是</option>
        <option value="0">否</option>
      </select>
      <div class="datasource-toolbar-actions">
        <button class="btn btn-toolbar btn-toolbar--query" onclick="queryKnowledgePage()" type="button">查询</button>
        <button class="btn btn-toolbar btn-toolbar--reset" onclick="resetKnowledgeFilters()" type="button">重置</button>
        <button class="btn btn-toolbar" onclick="openVectorSearchModal()" type="button">向量检索</button>
        <button class="btn btn-toolbar btn-toolbar--create" onclick="openKnowledgeModal()" type="button">新增</button>
      </div>
    </div>
    <div class="datasource-table-wrapper">
      <table class="datasource-table knowledge-table">
        <colgroup>
          <col class="knowledge-col-cb">
          <col class="knowledge-col-title">
          <col class="knowledge-col-type">
          <col class="knowledge-col-question">
          <col class="knowledge-col-emb">
          <col class="knowledge-col-recall">
          <col class="knowledge-col-file">
          <col class="knowledge-col-actions">
        </colgroup>
        <thead>
        <tr>
          <th><input id="selectAllKnowledge" onchange="toggleSelectAllKnowledge(this)" type="checkbox"></th>
          <th>标题</th>
          <th><span class="kb-th-icon" aria-hidden="true">📂</span>类型</th>
          <th>问题</th>
          <th><span class="kb-th-icon" aria-hidden="true">📡</span>向量化</th>
          <th>召回</th>
          <th>文件</th>
          <th>操作</th>
        </tr>
        </thead>
        <tbody id="knowledgeTableBody"></tbody>
      </table>
    </div>
    <div class="datasource-footer">
      <div class="datasource-footer-actions">
        <button class="btn btn-toolbar btn-toolbar--reset" onclick="refreshSelectedKnowledge()" type="button">批量刷新向量</button>
        <button class="btn btn-toolbar btn-toolbar--danger" onclick="deleteSelectedKnowledge()" type="button">批量删除</button>
      </div>
      <div class="datasource-pagination">
        <button onclick="changeKnowledgePage(-1)" type="button">上一页</button>
        <span id="knowledgePageInfo">第 1 页</span>
        <button onclick="changeKnowledgePage(1)" type="button">下一页</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="knowledgeModal" th:fragment="knowledgeModal">
  <div class="modal-content knowledge-modal-content">
    <h2 id="knowledgeModalTitle">新增</h2>
    <div class="form-group" id="knowledgeModalTypeGroup">
      <label for="kbModalType">类型</label>
      <select id="kbModalType" onchange="syncKnowledgeModalFields()" required>
        <option value="DOCUMENT">文档</option>
        <option value="QA">问答</option>
        <option value="FAQ">常见问题</option>
      </select>
    </div>
    <div class="form-group">
      <label for="kbModalTitle">标题</label>
      <input id="kbModalTitle" required type="text">
    </div>
    <div class="form-group" id="kbModalQuestionGroup" hidden>
      <label for="kbModalQuestion">问题</label>
      <textarea id="kbModalQuestion" rows="3"></textarea>
    </div>
    <div class="form-group" id="kbModalContentGroup" hidden>
      <label for="kbModalContent">内容 / 答案</label>
      <textarea id="kbModalContent" rows="5"></textarea>
    </div>
    <div class="form-group" id="kbModalFileGroup">
      <label for="kbModalFile">上传文件（文档类型必填）</label>
      <input accept=".txt,.md,.pdf,.doc,.docx" id="kbModalFile" type="file">
      <p class="form-hint">新增文档类知识时需选择文件；编辑时不可更换文件。</p>
    </div>
    <div class="form-group" id="kbModalSplitterGroup">
      <label for="kbModalSplitter">分块策略</label>
      <select id="kbModalSplitter">
        <option value="token">Token分割</option>
        <option value="recursive">递归分割</option>
        <option value="sentence">句子分割</option>
        <option value="paragraph">段落分割</option>
        <option value="semantic">语义分割</option>
      </select>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="closeKnowledgeModal()" type="button">取消</button>
      <button class="btn btn-primary" onclick="submitKnowledgeModal()" type="button">保存</button>
    </div>
  </div>
</div>

<div class="modal" id="vectorSearchModal" th:fragment="vectorSearchModal">
  <div class="modal-content knowledge-modal-content vector-search-modal">
    <h2>向量检索</h2>
    <p class="form-hint">在当前数据源已向量化的知识片段中，按语义查找与描述最相近的内容。「检索」返回原始片段；「增强检索」会合并多条相近片段并由模型生成简洁中文回答。</p>
    <div class="form-group">
      <label for="kbVectorQuery">检索描述</label>
      <textarea id="kbVectorQuery" placeholder="输入问题或关键词…" rows="4"></textarea>
    </div>
    <div class="form-group">
      <label for="kbVectorType">知识类型（可选）</label>
      <select id="kbVectorType">
        <option value="">全部类型</option>
        <option value="DOCUMENT">文档</option>
        <option value="QA">问答</option>
        <option value="FAQ">常见问题</option>
      </select>
    </div>
    <div class="form-group">
      <label for="kbVectorTopK">返回条数 topK（可选）</label>
      <input class="kb-vector-topk-input" id="kbVectorTopK" type="number" min="1" max="20" step="1" placeholder="1～20，留空用默认" title="留空时：普通检索默认 1 条，增强检索默认 5 条；填写则两种检索均使用该条数（上限 20）">
    </div>
    <div class="form-group" id="vectorSearchResultsGroup" hidden>
      <label>检索结果</label>
      <div class="vector-search-results" id="vectorSearchResults"></div>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="closeVectorSearchModal()" type="button">关闭</button>
      <button class="btn btn-secondary" onclick="submitVectorSearch()" type="button">检索</button>
      <button class="btn btn-primary" onclick="submitVectorRagSearch()" type="button">增强检索</button>
    </div>
  </div>
</div>

<div class="modal" id="kbEmbeddingErrorModal" th:fragment="kbEmbeddingErrorModal">
  <div class="modal-content knowledge-modal-content kb-embedding-error-modal">
    <h2>向量化失败</h2>
    <p class="form-hint kb-emb-error-meta" id="kbEmbeddingErrorTitle"></p>
    <div class="form-group">
      <label>错误详情</label>
      <pre class="kb-embedding-error-pre" id="kbEmbeddingErrorBody"></pre>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-primary" onclick="closeKbEmbeddingErrorModal()" type="button">关闭</button>
    </div>
  </div>
</div>
</body>
</html>
