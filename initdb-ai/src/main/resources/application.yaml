server:
  port: 8081
spring:
  application:
    name: initDB-AI
  datasource:
    url: jdbc:h2:mem:initdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
  ai:
    openai:
      api-key: ${AI_OPENAI_API-KEY}
      base-url: "https://dashscope.aliyuncs.com/compatible-mode/"
      chat:
        options:
          model: ${AI_OPENAI_CHAT_OPTIONS_MODEL:qvq-max-2025-03-25}
          max-tokens: 512
          temperature: 0.1          # 降低随机性，让回答更确定
          presencePenalty: 0.2      # 降低存在惩罚，避免干扰模型聚焦
          frequencyPenalty: 0.2     # 防止模型重复啰嗦
      embedding:
        options:
          model: ${AI_OPENAI_EMBEDDING_OPTIONS_MODEL:text-embedding-v1}
    alibaba:
      mcp:
        nacos:
          namespace: public
          server-addr: 127.0.0.1:8848
          username: nacos
          password: nacos
          register:
            enabled: false
            service-group: mcp-server       ## 指定分组名称
            service-name: db-mcp-server     ## 指定服务名称
            service-register: false
  thymeleaf:
    cache: false
logging:
  level:
    cn.fish: DEBUG
    com.alibaba.cloud.ai.graph: INFO
    io:
      modelcontextprotocol:
        client: DEBUG
        spec: DEBUG
        server: DEBUG
## SQL Agent Configuration
database-agent:
  max-results: 500

## Security Configuration
security:
  jwt:
    secret: ${JWT_SECRET:initdb-ai-jwt-secret-key-must-be-at-least-256-bits-long-for-security}
    access-token-expiration: 7200
    refresh-token-expiration: 604800
    issuer: initdb-ai
  captcha:
    expiration: 300
    length: 6
    send-interval: 60
    daily-limit: 10
  login:
    max-attempts: 5
    lock-duration: 900

