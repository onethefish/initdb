server:
  port: 8080
spring:
  application:
    name: initDB-AI
  ai:
    openai:
      api-key: ${AI_OPENAI_API-KEY}
      base-url: ${AI_OPENAI_BASE-URL}
      chat:
        options:
          model: ${AI_OPENAI_CHAT_OPTIONS_MODEL}
  thymeleaf:
    cache: false
logging:
  level:
    cn.fish: DEBUG
    com.alibaba.cloud.ai.graph: DEBUG

## SQL Agent Configuration
database-agent:
  max-results: 500

