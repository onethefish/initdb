server:
  port: 8081
spring:
  application:
    name: initDB-AI
  web:
    resources:
      static-locations: classpath:/web/static/
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/init_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DATASOURCE_USERNAME:init_db}
    password: ${DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
  ai:
    openai:
      api-key: ${AI_OPENAI_APIKEY}
      base-url: "https://dashscope.aliyuncs.com/compatible-mode"
      chat:
        options:
          model: ${AI_OPENAI_CHAT_OPTIONS_MODEL:qwen-plus-2025-07-28}
          max-tokens: 1024
#          temperature: 0.1          # 降低随机性，让回答更确定
#          presencePenalty: 0.2      # 降低存在惩罚，避免干扰模型聚焦
#          frequencyPenalty: 0.2     # 防止模型重复啰嗦
      embedding:
        options:
          model: ${AI_OPENAI_EMBEDDING_OPTIONS_MODEL:text-embedding-v1}
    alibaba:
      mcp:
        nacos:
          namespace: public
          server-addr: 127.0.0.1:8848
          username: nacos
          password: nacos
          register:
            enabled: false
            service-group: mcp-server       ## 指定分组名称
            service-name: db-mcp-server     ## 指定服务名称
            service-register: false
  thymeleaf:
    prefix: classpath:/web/templates/
    cache: false
logging:
  # 日志配置在 resources/conf 下时需显式指定（根目录的 logback.xml 才会被自动发现）
  config: classpath:conf/logback.xml
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false

initdb:
  export:
    # 单次导出 SQL 行数上限（服务端钳制用户请求）
    max-rows: 1000000
    # 任务记录与文件过期时间（小时），由清理调度删除
    job-ttl-hours: 24
    # 后台轮询处理 PENDING 任务的间隔（毫秒）
    poll-interval-ms: 3000
    # 过期清理调度间隔（毫秒）
    cleanup-interval-ms: 3600000
    # Excel 列宽（字符数近似）：下限保证可读；上限内随内容加宽，超出不再加宽且不换行（全文仍在单元格内）
    xlsx-min-column-width-chars: 16
    xlsx-max-column-width-chars: 80