server:
  port: 8081
spring:
  application:
    name: initDB-AI
  web:
    resources:
      static-locations: classpath:/web/static/
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/init_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DATASOURCE_USERNAME:aa}
    password: ${DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
  ai:
    # 未使用的 OpenAI 能力须关闭，否则会要求 spring.ai.openai.api-key（与 chat/embedding 分 key 冲突）
    model:
      audio:
        speech: none
        transcription: none
      image: none
      moderation: none
    openai:
      chat:
        api-key: ${SPRING_AI_OPENAI_CHAT_APIKEY:sk-41d5bcb9effe476196e6a1907078a1ce}
        base-url: ${SPRING_AI_OPENAI_CHAT_BASEURL:https://dashscope.aliyuncs.com/compatible-mode}
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:qwen-plus-2025-07-28}
          max-tokens: 1024
      #          temperature: 0.1          # 降低随机性，让回答更确定
      #          presencePenalty: 0.2      # 降低存在惩罚，避免干扰模型聚焦
      #          frequencyPenalty: 0.2     # 防止模型重复啰嗦
      embedding:
        api-key: ${SPRING_AI_OPENAI_EMBEDDING_APIKEY:sk-41d5bcb9effe476196e6a1907078a1ce}
        base-url: ${SPRING_AI_OPENAI_EMBEDDING_BASEURL:https://dashscope.aliyuncs.com/compatible-mode}
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL:text-embedding-v1}
    alibaba:
      mcp:
        nacos:
          namespace: public
          server-addr: 127.0.0.1:8848
          username: nacos
          password: nacos
          register:
            enabled: false
            service-group: mcp-server       ## 指定分组名称
            service-name: db-mcp-server     ## 指定服务名称
            service-register: false
  thymeleaf:
    prefix: classpath:/web/templates/
    cache: false
logging:
  # 日志配置在 resources/conf 下时需显式指定（根目录的 logback.xml 才会被自动发现）
  config: classpath:conf/logback.xml
  # 目录占位符由 Spring 解析；勿在 logback.xml 的 springProperty defaultValue 里写 ${system.basedir:${user.dir}}，会与 Logback 自身替换规则冲突
  file:
    path: ${system.basedir:${user.dir}}/logs
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false

initdb:
  chart:
    summary:
      # 消息条数 ≥ 该值才触发 checkpoint 自动压缩摘要（越大越少调用 chart_conversation_summary）
      min-messages: 16
      # 送入摘要模型的历史文本最大字符数（降低可显著减少 prompt token）
      history-max-chars: 8000
      # 切分时保留在尾部、不参与本轮摘要的消息条数（略增大可缩短每轮摘要 head）
      keep-recent-messages: 8
      # 超长时保留历史块末尾（靠近近期对话）；false 则保留开头（旧行为）
      truncate-tail-aligned: true
    session-title:
      # 非占位会话名时，每隔多少次流结束才再次调用标题模型（越大越少调用 chart_session_title）
      renaming-interval-streams: 5
      # 拼 snippet 时最多取多少条消息
      snippet-max-messages: 8
      # snippet 最大字符数（降低可减少 prompt token）
      snippet-max-chars: 1200
      # true：取末尾若干条消息（更贴近当前话题）；false：取开头（旧行为）
      snippet-messages-from-tail: true
      # snippet 超长时 true 保留末尾；false 截头 + ...[truncated]
      snippet-chars-truncate-tail: true
  db:
    metadata-cache:
      # 全表清单 / 表结构元数据本地缓存（秒）；同一会话内多次工具调用可命中，避免重复 JDBC getTables/getColumns
      ttl-seconds: 1800
    intent-route:
      # 高置信度时跳过路由 LLM（省约 450 prompt/次）；关闭则始终走模型
      heuristic-enabled: true
      # 仅长度 ≤ 该值时才匹配「纯寒暄」启发式（略增大可覆盖稍长寒暄）
      chitchat-max-chars: 28
    query-sql-check:
      # JSqlParser 语法预检：解析失败则直接返回校验失败，不调 LLM
      syntax-pre-check-enabled: true
      # 语法通过时是否跳过 LLM（省 token；不再做提示词中的语义/风险启发式）
      skip-llm-when-syntax-ok: true
      # 参与解析的 SQL 最大字符数
      max-sql-chars: 256000
  export:
    # 单次导出 SQL 行数上限（服务端钳制用户请求）
    max-rows: 10000
    # 任务记录与文件过期时间（小时），由清理调度删除
    job-ttl-hours: 24
    # 兜底轮询 PENDING 的间隔（毫秒）；提交导出后会发事件异步立刻处理，此处主要应对重启遗漏等
    poll-interval-ms: 60000
    # 过期清理调度间隔（毫秒）
    cleanup-interval-ms: 3600000
    # Excel 列宽（字符数近似）：下限保证可读；上限内随内容加宽，超出不再加宽且不换行（全文仍在单元格内）
    xlsx-min-column-width-chars: 16
    xlsx-max-column-width-chars: 80