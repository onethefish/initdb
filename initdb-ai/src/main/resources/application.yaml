server:
  port: 8080
spring:
  application:
    name: initDB-AI
  ai:
    openai:
      api-key: ${AI_OPENAI_API-KEY}
      base-url: "https://dashscope.aliyuncs.com/compatible-mode/"
      chat:
        options:
          model: ${AI_OPENAI_CHAT_OPTIONS_MODEL:qwen-plus}
          max-tokens: 512
          presencePenalty: 0.5

  thymeleaf:
    cache: false
logging:
  level:
    cn.fish: DEBUG
    com.alibaba.cloud.ai.graph: DEBUG

## SQL Agent Configuration
database-agent:
  max-results: 500

