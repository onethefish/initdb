<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div class="page-panel page-panel-active" id="chatPage" th:fragment="chatPage">
  <div class="chat-layout">
    <div class="chat-left-panel">
      <div class="chat-actions">
        <button class="create-chat-btn" onclick="createModal()" type="button">创建新对话</button>
        <button class="delete-chat-btn" onclick="deleteModal()" type="button">删除所有对话</button>
      </div>
      <div class="session-list chat-session-list" id="sessionList"></div>
    </div>
    <div class="chat-main-panel">
      <div class="welcome-screen" id="welcomeScreen">
        <h2>你好！我是智能数据库助手</h2>
        <p>我可以通过自然语言查询你的数据库信息。请先在「数据源管理」中维护并测试数据源，再在此创建对话并选择要使用的数据源。</p>
        <button class="create-chat-btn welcome-create-btn" onclick="createModal()" type="button">创建第一个对话</button>
      </div>
      <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="currentSessionHeader"></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="input-area">
          <div class="input-area-row">
            <input disabled id="userInput" onkeydown="handleUserInputKeydown(event)" placeholder="请输入你的问题..." type="text">
            <button disabled id="contextualizeBtn" onclick="previewContextualize()" title="根据当前会话历史补全问句（快捷键 F2）" type="button">补全会话</button>
            <button disabled id="sendMessageBtn" onclick="sendMessage()" title="发送（快捷键 Enter）" type="button">发送</button>
          </div>
          <p class="input-shortcuts-hint" id="inputShortcutsHint"><kbd>Enter</kbd> 发送 · <kbd>F2</kbd> 补全会话 · <kbd>Ctrl</kbd>+<kbd>Enter</kbd> 填入输入框（Mac 为 <kbd>⌘</kbd>+<kbd>Enter</kbd>）</p>
          <details class="db-export-panel" id="dbExportPanel">
            <summary class="db-export-summary">数据导出（异步 CSV / Excel）</summary>
            <div class="db-export-body">
              <p class="db-export-hint">提交后服务端会再次校验 SQL；导出行数受服务端上限约束。完成后将自动下载文件。</p>
              <label class="db-export-label" for="exportSqlInput">SQL（可编辑）</label>
              <textarea class="db-export-sql" id="exportSqlInput" rows="4" spellcheck="false"
                        placeholder="可从最近一条助手回答中的 SQL 代码块自动带出，或自行粘贴查询"></textarea>
              <div class="db-export-toolbar">
                <button class="btn btn-secondary db-export-fill-btn" id="exportFillSqlFromChatBtn" type="button">从最近一条助手回答填入 SQL</button>
                <label class="db-export-inline">格式
                  <select id="exportFormatSelect">
                    <option value="CSV">CSV</option>
                    <option value="XLSX">Excel (.xlsx)</option>
                  </select>
                </label>
                <label class="db-export-inline">最大行数
                  <input class="db-export-max-rows" id="exportMaxRowsInput" min="1" placeholder="默认服务端上限" type="number">
                </label>
                <button class="btn btn-primary" id="exportSubmitBtn" type="button">创建导出并等待下载</button>
              </div>
              <div class="db-export-status" id="exportJobStatus" aria-live="polite"></div>
            </div>
          </details>
          <div class="standalone-preview-wrap" id="standalonePreviewWrap" style="display: none">
            <div class="standalone-preview-toolbar">
              <label class="standalone-preview-label" for="standalonePreviewInput">补全后的问句（可编辑）</label>
              <button class="standalone-preview-fill-btn" id="standaloneFillBtn" onclick="applyStandaloneToUserInput()" title="将补全结果写入上方输入框（快捷键 Ctrl+Enter，Mac 为 ⌘+Enter）" type="button">填入输入框</button>
            </div>
            <textarea class="standalone-preview-input" id="standalonePreviewInput" rows="2" spellcheck="false"></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="sessionModal" th:fragment="sessionModal">
  <div class="modal-content">
    <h2>创建新对话</h2>
    <div class="form-group">
      <label for="sessionName">对话名称</label>
      <input id="sessionName" required type="text" value="新的对话">
    </div>
    <div class="form-group">
      <label for="chatDatasourceSelect">数据源</label>
      <select id="chatDatasourceSelect" required>
        <option value="">加载中…</option>
      </select>
      <p class="form-hint" id="chatDatasourceHint">仅显示「数据源管理」中已启用且连接测试成功的数据源。若无选项，请先到数据源管理页维护并测试连接。</p>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="closeModal()" type="button">取消</button>
      <button class="btn btn-primary" onclick="createNewSession()" type="button">创建</button>
    </div>
  </div>
</div>
</body>
</html>
